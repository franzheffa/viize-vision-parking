apiVersion: apps/v1
kind: Deployment
metadata:
  name: viize-parking
  namespace: viize-parking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: viize-parking
  template:
    metadata:
      labels:
        app: viize-parking
    spec:
      containers:
        - name: web
          image: gcr.io/PROJECT_ID/viize-vision-parking:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: viize-parking-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
