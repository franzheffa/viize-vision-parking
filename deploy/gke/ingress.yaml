apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: viize-parking
  namespace: viize-parking
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - host: viize-parking.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: viize-parking
                port:
                  number: 80
